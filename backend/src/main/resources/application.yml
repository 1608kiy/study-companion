server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_companion?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.studycompanion.entity

jwt:
  secret: study-companion-jwt-secret-key-2024
  expiration: 86400000  # 24小时

logging:
  level:
    com.studycompanion: debug
    org.springframework: info

# 文件上传路径
upload:
  path: /data/studycompanion/uploads/

# AI配置
ai:
  enabled: true
  provider: zhipu  # zhipu 或 qwen
  zhipu:
    api-key: your-api-key
  qwen:
    api-key: your-api-key
