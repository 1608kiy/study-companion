server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_companion?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-aliases-package: com.studycompanion.entity

jwt:
  secret: ${JWT_SECRET:study-companion-default-secret-change-in-production}
  expiration: 86400000  # 24小时

logging:
  level:
    com.studycompanion: info
    org.springframework: info

# 文件上传路径
upload:
  path: /data/studycompanion/uploads/

# AI配置
ai:
  enabled: true
  base-url: https://token-plan-sgp.xiaomimimo.com/v1
  api-key: ${AI_API_KEY:your-api-key}
  model: mimo-v2.5-pro
