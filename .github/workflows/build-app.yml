name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run tests
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 30

  release:
    name: Create Release
    needs: [build-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./artifacts/web

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 智学伴 ${{ github.ref_name }}
            
            ### Web 端部署
            1. 下载 `web-dist.zip` 解压
            2. 部署到 Web 服务器（Nginx/Apache）
            3. 配置反向代理到后端 API
            
            ### 微信小程序
            1. 克隆仓库 `miniapp/` 目录
            2. 使用微信开发者工具导入项目
            3. 配置后端 API 地址
            4. 上传并提交审核
            
            ### Android App
            1. 下载 `miniapp/` 目录
            2. 使用 HBuilderX 打开项目
            3. 点击"发行" → "原生App-云打包"
            4. 选择 Android，打包生成 APK
            
            ### 后端部署
            ```bash
            # 1. 安装依赖
            apt install openjdk-17-jdk mysql-server redis-server
            
            # 2. 初始化数据库
            mysql -u root -p study_companion < backend/sql/init.sql
            
            # 3. 配置环境变量
            export AI_API_KEY="your-api-key"
            export JWT_SECRET="your-jwt-secret"
            
            # 4. 启动后端
            mvn spring-boot:run -f backend/pom.xml
            ```
          files: |
            ./artifacts/web/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
