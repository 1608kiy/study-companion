name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run tests
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 30

  build-miniapp:
    name: Build Miniapp
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd miniapp
          npm install

      - name: Build WeChat Miniapp
        run: |
          cd miniapp
          npx uni build -p mp-weixin

      - name: Upload miniapp
        uses: actions/upload-artifact@v4
        with:
          name: miniapp-weixin
          path: miniapp/dist/build/mp-weixin
          retention-days: 30

  release:
    name: Create Release
    needs: [build-web, build-miniapp]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./artifacts/web

      - name: Download Miniapp build
        uses: actions/download-artifact@v4
        with:
          name: miniapp-weixin
          path: ./artifacts/miniapp-weixin

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 智学伴 ${{ github.ref_name }}
            
            ### Web 端
            - 下载 `web-dist.zip` 解压部署到 Web 服务器
            
            ### 微信小程序
            - 下载 `miniapp-weixin.zip`
            - 使用微信开发者工具导入项目
            - 上传并提交审核
            
            ### Android App
            - 使用 HBuilderX 打开 miniapp 项目
            - 点击"发行" -> "原生App-云打包"
            - 选择 Android，打包生成 APK
          files: |
            ./artifacts/web/**
            ./artifacts/miniapp-weixin/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
